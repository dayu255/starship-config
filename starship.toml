# --- 全体のレイアウト設定 ---
format = "$username$all$fill$cmd_duration$time$line_break$os$character"

# --- モジュールの個別設定 ---
[fill]
symbol = " "

[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = false
show_always = true
aliases = { "odayu" = "odayu" }

[time]
disabled = false
format = '[ $time ]($style) '
time_format = '%H:%M'
utc_time_offset = '+9'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[cmd_duration]
min_time = 0 # 0ミリ秒から常に表示（画像のように16msでも表示させるため）
show_milliseconds = true
format = "[$duration <](bold yellow) "

[os]
disabled = false
format = "[$symbol]($style)"

